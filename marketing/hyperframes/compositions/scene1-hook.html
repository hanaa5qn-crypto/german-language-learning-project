<template id="scene1-hook-template">
  <div data-composition-id="scene1-hook" data-width="1080" data-height="1920" data-duration="4">
    <div class="s1-content">
      <h1 class="s1-line1">
        <span class="hl">Герман</span> хэл сурмаар байна уу?
      </h1>
      <p class="s1-line2">Гэхдээ хаанаас эхлэхээ мэдэхгүй?</p>
    </div>

    <style>
      [data-composition-id="scene1-hook"] .s1-content {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 40px;
        padding: 0 110px;
        box-sizing: border-box;
      }
      [data-composition-id="scene1-hook"] .s1-line1 {
        font-family: "Unbounded", sans-serif;
        font-weight: 700;
        font-size: 108px;
        line-height: 1.04;
        letter-spacing: -0.02em;
        color: #f2f0fa;
        max-width: 860px;
      }
      [data-composition-id="scene1-hook"] .s1-line1 .hl {
        color: #b388fa;
      }
      [data-composition-id="scene1-hook"] .s1-line2 {
        font-family: "Golos Text", sans-serif;
        font-weight: 500;
        font-size: 52px;
        line-height: 1.2;
        color: #a8a3c8;
        max-width: 760px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const ENTER = "cubic-bezier(0.22, 1, 0.36, 1)";
        gsap.registerEase && null;
        const l1 = '[data-composition-id="scene1-hook"] .s1-line1';
        const l2 = '[data-composition-id="scene1-hook"] .s1-line2';
        const hl = '[data-composition-id="scene1-hook"] .hl';

        // Line-by-line slide-up entrances (stagger ~150ms).
        tl.from(l1, { y: 80, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.2);
        tl.from(l2, { y: 60, opacity: 0, duration: 0.6, ease: "power2.out" }, 0.55);
        // Violet word emphasis pop.
        tl.from(hl, { scale: 0.8, opacity: 0, duration: 0.5, ease: "back.out(1.7)" }, 0.3);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </div>
</template>
