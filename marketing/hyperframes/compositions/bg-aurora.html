<template id="bg-aurora-template">
  <div data-composition-id="bg-aurora" data-width="1080" data-height="1920" data-duration="30">
    <div class="bg-root">
      <div class="aurora aurora-a" data-layout-ignore></div>
      <div class="aurora aurora-b" data-layout-ignore></div>
      <div class="aurora aurora-c" data-layout-ignore></div>
      <div class="grain"></div>
    </div>

    <style>
      [data-composition-id="bg-aurora"] .bg-root {
        width: 1080px;
        height: 1920px;
        background: #060512;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="bg-aurora"] .aurora {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.55;
        will-change: transform;
      }
      /* Radial glows (not linear gradients) to avoid H.264 banding */
      [data-composition-id="bg-aurora"] .aurora-a {
        width: 900px;
        height: 900px;
        top: -200px;
        left: -150px;
        background: radial-gradient(circle, #b388fa 0%, rgba(179, 136, 250, 0) 70%);
      }
      [data-composition-id="bg-aurora"] .aurora-b {
        width: 820px;
        height: 820px;
        bottom: -150px;
        right: -180px;
        background: radial-gradient(circle, #66aafd 0%, rgba(102, 170, 253, 0) 70%);
        opacity: 0.45;
      }
      [data-composition-id="bg-aurora"] .aurora-c {
        width: 700px;
        height: 700px;
        top: 760px;
        left: 280px;
        background: radial-gradient(circle, #fb6d8e 0%, rgba(251, 109, 142, 0) 70%);
        opacity: 0.35;
      }
      [data-composition-id="bg-aurora"] .grain {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.02), transparent 60%);
        mix-blend-mode: screen;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const a = '[data-composition-id="bg-aurora"] .aurora-a';
        const b = '[data-composition-id="bg-aurora"] .aurora-b';
        const c = '[data-composition-id="bg-aurora"] .aurora-c';

        // Slow continuous drift across the full 30s — finite, seekable, deterministic.
        tl.to(a, { x: 180, y: 120, duration: 15, ease: "sine.inOut" }, 0);
        tl.to(a, { x: 0, y: 0, duration: 15, ease: "sine.inOut" }, 15);

        tl.to(b, { x: -160, y: -110, duration: 15, ease: "sine.inOut" }, 0);
        tl.to(b, { x: 0, y: 0, duration: 15, ease: "sine.inOut" }, 15);

        tl.to(c, { x: 120, y: -90, scale: 1.15, duration: 15, ease: "sine.inOut" }, 0);
        tl.to(c, { x: 0, y: 0, scale: 1, duration: 15, ease: "sine.inOut" }, 15);

        // Brighten slightly at the close (last 4s) per storyboard.
        tl.to([a, b, c], { opacity: "+=0.12", duration: 3.5, ease: "power1.out" }, 26);

        window.__timelines = window.__timelines || {};
        window.__timelines["bg-aurora"] = tl;
      })();
    </script>
  </div>
</template>
