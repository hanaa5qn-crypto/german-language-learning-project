    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="scene5-cta"] ' + s;

        tl.from(q(".logo-mark"), { scale: 0, opacity: 0, duration: 0.7, ease: "back.out(1.7)" }, 0.15);

        tl.from(q(".s5-url"), { opacity: 0, y: 20, duration: 0.45, ease: "power2.out" }, 1.15);

        // CTA pulse (finite repeats over remaining time).
        tl.to(q(".cta-btn"), { scale: 1.06, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 3 }, 1.6);

        window.__timelines = window.__timelines || {};
