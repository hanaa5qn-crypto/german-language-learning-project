<template id="scene4-ladder-template">
  <div data-composition-id="scene4-ladder" data-width="1080" data-height="1920" data-duration="4">
    <div class="s4-content">
      <p class="s4-label">A1-ээс C2 хүртэл</p>
      <div class="ladder">
        <div class="lvl lvl-1"><span>A1</span></div>
        <div class="lvl lvl-2"><span>A2</span></div>
        <div class="lvl lvl-3"><span>B1</span></div>
        <div class="lvl lvl-4"><span>B2</span></div>
        <div class="lvl lvl-5"><span>C1</span></div>
        <div class="lvl lvl-6"><span>C2</span></div>
      </div>
    </div>

    <style>
      [data-composition-id="scene4-ladder"] .s4-content {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 70px;
        padding: 0 90px;
        box-sizing: border-box;
      }
      [data-composition-id="scene4-ladder"] .s4-label {
        font-family: "Unbounded", sans-serif;
        font-weight: 700;
        font-size: 76px;
        letter-spacing: -0.02em;
        color: #f2f0fa;
        text-align: center;
      }
      [data-composition-id="scene4-ladder"] .ladder {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        max-width: 900px;
      }
      [data-composition-id="scene4-ladder"] .lvl {
        width: 270px;
        height: 200px;
        border-radius: 40px;
        background: #15132b;
        border: 1px solid rgba(131, 126, 168, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene4-ladder"] .lvl span {
        font-family: "Unbounded", sans-serif;
        font-weight: 700;
        font-size: 92px;
        color: #837ea8;
      }
      /* Lit state colors blend violet -> blue -> rose across the ladder */
      [data-composition-id="scene4-ladder"] .lvl-1.on { background: linear-gradient(135deg, #b388fa, #a07cf5); }
      [data-composition-id="scene4-ladder"] .lvl-2.on { background: linear-gradient(135deg, #a07cf5, #8e93f8); }
      [data-composition-id="scene4-ladder"] .lvl-3.on { background: linear-gradient(135deg, #8e93f8, #66aafd); }
      [data-composition-id="scene4-ladder"] .lvl-4.on { background: linear-gradient(135deg, #66aafd, #8c93e3); }
      [data-composition-id="scene4-ladder"] .lvl-5.on { background: linear-gradient(135deg, #b988c9, #fb6d8e); }
      [data-composition-id="scene4-ladder"] .lvl-6.on { background: linear-gradient(135deg, #fb6d8e, #ff8fa8); }
      [data-composition-id="scene4-ladder"] .lvl.on span {
        color: #060512;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="scene4-ladder"] ' + s;

        tl.from(q(".s4-label"), { y: 50, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.15);

        const levels = [".lvl-1", ".lvl-2", ".lvl-3", ".lvl-4", ".lvl-5", ".lvl-6"];
        // Entrance pop for all chips (still un-lit).
        tl.from(levels.map(q), { scale: 0.6, opacity: 0, duration: 0.5, ease: "back.out(1.6)", stagger: 0.08 }, 0.4);

        // Light up sequentially left-to-right.
        levels.forEach((sel, i) => {
          const at = 1.1 + i * 0.38;
          tl.set(q(sel), { className: "+=on" }, at);
          tl.fromTo(q(sel), { scale: 1 }, { scale: 1.12, duration: 0.18, ease: "back.out(2)", yoyo: true, repeat: 1 }, at);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["scene4-ladder"] = tl;
      })();
    </script>
  </div>
</template>
