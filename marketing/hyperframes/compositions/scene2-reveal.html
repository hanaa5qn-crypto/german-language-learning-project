    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const title = '[data-composition-id="scene2-reveal"] .s2-title';
        const sub = '[data-composition-id="scene2-reveal"] .s2-sub';
        const phone = '[data-composition-id="scene2-reveal"] .phone';
        const card = '[data-composition-id="scene2-reveal"] .app-card';
        const minis = '[data-composition-id="scene2-reveal"] .mini-card';

        // Headline first.
        tl.from(title, { y: 60, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.15);
        // Phone springs up from bottom with overshoot.
        tl.from(
          phone,
          { y: 1100, opacity: 0, duration: 0.85, ease: "back.out(1.6)" },
          0.3,
        );
        // Sub slides up after phone lands.
        tl.from(sub, { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.05);
        // Inner content settles.
        tl.from(card, { scale: 0.92, opacity: 0, duration: 0.5, ease: "back.out(1.4)" }, 1.0);
        tl.from(minis, { y: 30, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.1 }, 1.25);

        window.__timelines = window.__timelines || {};
        window.__timelines["scene2-reveal"] = tl;
      })();
