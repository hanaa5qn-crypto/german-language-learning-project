<template id="s09-map-template">
  <div data-composition-id="s09-map" data-width="1920" data-height="1080" data-duration="5">
    <div class="s9-stage">
      <div class="map-grid" data-layout-ignore></div>

      <svg class="route" viewBox="0 0 1920 1080" data-layout-ignore>
        <path class="route-line" d="M 300 820 C 560 820 540 560 760 540 S 1180 600 1320 420 S 1600 300 1680 240"
              fill="none" stroke="#f2f0fa" stroke-width="8" stroke-linecap="round"/>
      </svg>

      <!-- milestone dots -->
      <div class="dot d1" data-layout-ignore><span class="dot-lbl">A1</span></div>
      <div class="dot d2" data-layout-ignore><span class="dot-lbl">A2</span></div>
      <div class="dot d3" data-layout-ignore><span class="dot-lbl">B1</span></div>
      <div class="dot d4" data-layout-ignore><span class="dot-lbl">B2</span></div>
      <div class="dot d5" data-layout-ignore><span class="dot-lbl">C2</span></div>

      <!-- callout cards -->
      <div class="callout c1">
        <div class="co-ic"><svg viewBox="0 0 24 24" width="28" height="28"><path d="M5 12l4 4 10-10" fill="none" stroke="#66aafd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="co-txt">Өдрийн давталт бэлэн</div>
      </div>
      <div class="callout c2">
        <div class="co-ic"><svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 3l2.5 5.5L20 9l-4 4 1 6-5-3-5 3 1-6-4-4 5.5-.5z" fill="#b388fa"/></svg></div>
        <div class="co-txt">Шинэ түвшин нээгдлээ</div>
      </div>
      <div class="callout c3">
        <div class="co-ic flame"><span class="fl"></span></div>
        <div class="co-txt">7 хоногийн streak</div>
      </div>
      <div class="callout c4">
        <div class="co-ic"><svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 4a6 6 0 0 0-6 6v4l-2 3h16l-2-3v-4a6 6 0 0 0-6-6z M10 20a2 2 0 0 0 4 0" fill="none" stroke="#fb6d8e" stroke-width="2.2" stroke-linejoin="round"/></svg></div>
        <div class="co-txt">SRS сануулга</div>
      </div>
    </div>

    <style>
      [data-composition-id="s09-map"] .s9-stage { width: 1920px; height: 1080px; position: relative; }
      [data-composition-id="s09-map"] .map-grid {
        position: absolute; inset: 0; opacity: 0.5;
        background-image:
          radial-gradient(circle, rgba(179,136,250,0.12) 1.5px, transparent 1.6px);
        background-size: 56px 56px;
      }
      [data-composition-id="s09-map"] .route { position: absolute; inset: 0; width: 1920px; height: 1080px; }
      [data-composition-id="s09-map"] .route-line {
        filter: drop-shadow(0 0 16px rgba(242,240,250,0.5));
      }
      [data-composition-id="s09-map"] .dot {
        position: absolute; width: 30px; height: 30px; border-radius: 50%;
        background: #b388fa; box-shadow: 0 0 24px rgba(179,136,250,0.8); will-change: transform, opacity;
      }
      [data-composition-id="s09-map"] .dot-lbl {
        position: absolute; top: -52px; left: 50%; transform: translateX(-50%);
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 28px; color: #f2f0fa;
      }
      [data-composition-id="s09-map"] .d1 { left: 286px; top: 806px; }
      [data-composition-id="s09-map"] .d2 { left: 746px; top: 526px; }
      [data-composition-id="s09-map"] .d3 { left: 1080px; top: 530px; }
      [data-composition-id="s09-map"] .d4 { left: 1306px; top: 406px; }
      [data-composition-id="s09-map"] .d5 { left: 1666px; top: 226px; }
      [data-composition-id="s09-map"] .callout {
        position: absolute; display: flex; align-items: center; gap: 16px;
        background: rgba(21,19,43,0.92); border: 1px solid rgba(179,136,250,0.35); border-radius: 20px;
        padding: 20px 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); will-change: transform, opacity;
      }
      [data-composition-id="s09-map"] .co-ic {
        width: 52px; height: 52px; border-radius: 14px; background: rgba(179,136,250,0.12);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      [data-composition-id="s09-map"] .co-txt {
        font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 32px; color: #f2f0fa;
      }
      [data-composition-id="s09-map"] .flame { background: rgba(251,109,142,0.14); }
      [data-composition-id="s09-map"] .fl {
        width: 22px; height: 28px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        background: linear-gradient(to top, #fb6d8e, #ffb36b);
        box-shadow: 0 0 16px rgba(251,109,142,0.7); transform: rotate(-6deg);
      }
      [data-composition-id="s09-map"] .c1 { left: 150px; top: 200px; }
      [data-composition-id="s09-map"] .c2 { right: 150px; top: 540px; }
      [data-composition-id="s09-map"] .c3 { left: 220px; top: 460px; }
      [data-composition-id="s09-map"] .c4 { right: 220px; top: 820px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s09-map"] ' + s;

        // Draw the route line.
        const path = document.querySelector(q(".route-line"));
        const len = path.getTotalLength();
        path.style.strokeDasharray = len;
        path.style.strokeDashoffset = len;
        tl.to(path, { strokeDashoffset: 0, duration: 1.8, ease: "power2.inOut" }, 0.2);

        // Milestone dots pop in sequence as the line passes.
        tl.from(q(".d1"), { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 0.3);
        tl.from(q(".d2"), { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 0.8);
        tl.from(q(".d3"), { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 1.2);
        tl.from(q(".d4"), { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 1.6);
        tl.from(q(".d5"), { scale: 0, opacity: 0, duration: 0.4, ease: "back.out(2)" }, 2.0);

        // Callout cards fly in.
        tl.from(q(".c1"), { x: -80, opacity: 0, duration: 0.5, ease: "cubic-bezier(0.22,1,0.36,1)" }, 2.2);
        tl.from(q(".c2"), { x: 80, opacity: 0, duration: 0.5, ease: "cubic-bezier(0.22,1,0.36,1)" }, 2.45);
        tl.from(q(".c3"), { y: 40, opacity: 0, duration: 0.5, ease: "cubic-bezier(0.22,1,0.36,1)" }, 2.7);
        tl.from(q(".c4"), { y: 40, opacity: 0, duration: 0.5, ease: "cubic-bezier(0.22,1,0.36,1)" }, 2.95);

        // Flame flicker.
        tl.to(q(".fl"), { scaleY: 1.18, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 4, transformOrigin: "50% 100%" }, 3.2);
        // Final dot pulse.
        tl.to(q(".d5"), { scale: 1.25, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 3.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["s09-map"] = tl;
      })();
    </script>
  </div>
</template>
