<template id="s07-unified-template">
  <div data-composition-id="s07-unified" data-width="1920" data-height="1080" data-duration="3">
    <div class="s7-stage">
      <!-- blurred dashboard ghost behind -->
      <div class="s7-ghost" data-layout-ignore>
        <div class="g-card"></div><div class="g-card"></div><div class="g-card"></div><div class="g-card"></div>
      </div>

      <h2 class="s7-head">Нэгдсэн платформ</h2>

      <div class="kpi-strip">
        <div class="kpi"><div class="kpi-num">6,700+</div><div class="kpi-lbl">үг</div></div>
        <div class="kpi-div"></div>
        <div class="kpi"><div class="kpi-num">A1→C2</div><div class="kpi-lbl">түвшин</div></div>
        <div class="kpi-div"></div>
        <div class="kpi"><div class="kpi-num">99%</div><div class="kpi-lbl">санах ой</div></div>
      </div>
    </div>

    <style>
      [data-composition-id="s07-unified"] .s7-stage {
        width: 1920px; height: 1080px; position: relative;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 56px;
      }
      [data-composition-id="s07-unified"] .s7-ghost {
        position: absolute; inset: 140px 260px; filter: blur(22px); opacity: 0.55;
        display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 40px;
      }
      [data-composition-id="s07-unified"] .g-card {
        background: #ffffff; border-radius: 28px; box-shadow: 0 30px 80px rgba(75,50,140,0.2);
      }
      [data-composition-id="s07-unified"] .s7-head {
        position: relative; z-index: 2;
        font-family: "Unbounded", sans-serif; font-weight: 700; font-style: italic;
        font-size: 92px; letter-spacing: -0.02em; color: #241c44; text-align: center;
      }
      [data-composition-id="s07-unified"] .kpi-strip {
        position: relative; z-index: 2;
        display: flex; align-items: center; gap: 44px;
        background: rgba(255,255,255,0.92); border: 1px solid #e6dcfa; border-radius: 26px;
        padding: 36px 64px; box-shadow: 0 30px 80px rgba(75,50,140,0.22);
      }
      [data-composition-id="s07-unified"] .kpi { text-align: center; }
      [data-composition-id="s07-unified"] .kpi-num {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 58px;
        background: linear-gradient(100deg, #b388fa, #66aafd);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      [data-composition-id="s07-unified"] .kpi-lbl { font-size: 28px; color: #6b5f92; font-weight: 600; }
      [data-composition-id="s07-unified"] .kpi-div { width: 2px; height: 70px; background: #e6dcfa; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s07-unified"] ' + s;

        tl.from(q(".s7-ghost"), { opacity: 0, scale: 1.05, duration: 0.6, ease: "power2.out" }, 0);
        tl.from(q(".s7-head"), { y: 50, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.2);
        tl.from(q(".kpi-strip"), { y: 50, opacity: 0, duration: 0.6, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.5);
        tl.from(q(".kpi"), { y: 24, opacity: 0, duration: 0.4, ease: "back.out(1.6)", stagger: 0.12 }, 0.7);
        // ghost drifts subtly
        tl.to(q(".s7-ghost"), { y: -20, duration: 3, ease: "sine.inOut" }, 0.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["s07-unified"] = tl;
      })();
    </script>
  </div>
</template>
