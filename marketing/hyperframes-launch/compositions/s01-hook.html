<template id="s01-hook-template">
  <div data-composition-id="s01-hook" data-width="1920" data-height="1080" data-duration="5">
    <!-- Giant blurred "Vi" letterforms drifting behind -->
    <div class="ghost" data-layout-ignore>Vi</div>

    <div class="s1-content">
      <h1 class="s1-line">
        <span class="seg seg-de"><span class="hl">Герман</span> хэл</span>
        <span class="seg seg-rest"> сурах хамгийн ухаалаг арга</span>
        <span class="caret" data-layout-ignore></span>
      </h1>
    </div>

    <style>
      [data-composition-id="s01-hook"] .ghost {
        position: absolute;
        top: -120px;
        left: -60px;
        font-family: "Unbounded", sans-serif;
        font-weight: 800;
        font-size: 1100px;
        line-height: 0.8;
        color: rgba(179, 136, 250, 0.1);
        filter: blur(14px);
        letter-spacing: -0.04em;
        white-space: nowrap;
        user-select: none;
      }
      [data-composition-id="s01-hook"] .s1-content {
        position: relative;
        z-index: 2;
        width: 1920px;
        height: 1080px;
        display: flex;
        align-items: center;
        padding: 0 170px;
        box-sizing: border-box;
      }
      [data-composition-id="s01-hook"] .s1-line {
        font-family: "Unbounded", sans-serif;
        font-weight: 700;
        font-size: 118px;
        line-height: 1.08;
        letter-spacing: -0.02em;
        color: #f2f0fa;
        max-width: 1380px;
        position: relative;
      }
      [data-composition-id="s01-hook"] .hl {
        color: #b388fa;
      }
      [data-composition-id="s01-hook"] .caret {
        display: inline-block;
        width: 8px;
        height: 96px;
        background: #b388fa;
        margin-left: 14px;
        vertical-align: -16px;
        border-radius: 4px;
      }
      /* typewriter clip masks — width animated by GSAP */
      [data-composition-id="s01-hook"] .seg {
        display: inline;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s01-hook"] ' + s;

        // Char-by-char typewriter: wrap each character of the headline in a span,
        // reveal sequentially with steps-like staggered opacity (deterministic).
        const root = document.querySelector(q(".s1-line"));
        const segDe = document.querySelector(q(".seg-de"));
        const segRest = document.querySelector(q(".seg-rest"));

        function splitChars(el, keepHL) {
          const out = [];
          el.querySelectorAll(":scope > *, :scope").forEach(() => {});
          // Walk child nodes; wrap text chars, keep element wrappers (.hl) intact-ish.
          const nodes = Array.from(el.childNodes);
          el.textContent = "";
          nodes.forEach((node) => {
            if (node.nodeType === 3) {
              node.textContent.split("").forEach((ch) => {
                const s = document.createElement("span");
                s.className = "ch";
                s.style.opacity = "0";
                s.textContent = ch;
                el.appendChild(s);
                out.push(s);
              });
            } else if (node.nodeType === 1) {
              const wrap = node.cloneNode(false);
              el.appendChild(wrap);
              node.textContent.split("").forEach((ch) => {
                const s = document.createElement("span");
                s.className = "ch";
                s.style.opacity = "0";
                s.textContent = ch;
                wrap.appendChild(s);
                out.push(s);
              });
            }
          });
          return out;
        }

        const chars = [...splitChars(segDe), ...splitChars(segRest)];
        const caret = document.querySelector(q(".caret"));

        // Reveal chars over ~2.6s.
        chars.forEach((c, i) => {
          tl.to(c, { opacity: 1, duration: 0.01 }, 0.25 + i * 0.052);
        });

        // "Герман" violet pop after it finishes typing (first 6 chars).
        tl.to(q(".hl"), { scale: 1.06, duration: 0.25, ease: "back.out(2)", transformOrigin: "left center" }, 0.6);
        tl.to(q(".hl"), { scale: 1, duration: 0.25, ease: "power2.out" }, 0.85);

        // Caret blink (finite repeats).
        tl.to(caret, { opacity: 0, duration: 0.4, ease: "steps(1)", yoyo: true, repeat: 9 }, 0.3);

        // Ghost letterforms drift behind the whole time.
        tl.fromTo(q(".ghost"), { x: -40, y: 0 }, { x: 60, y: 50, duration: 5, ease: "sine.inOut" }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["s01-hook"] = tl;
      })();
    </script>
  </div>
</template>
