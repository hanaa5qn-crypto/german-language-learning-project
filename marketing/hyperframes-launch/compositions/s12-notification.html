<template id="s12-notification-template">
  <div data-composition-id="s12-notification" data-width="1920" data-height="1080" data-duration="5">
    <div class="s12-stage">
      <div class="ghost-word" data-layout-ignore>Lingua</div>

      <div class="phone">
        <div class="lockscreen">
          <div class="lock-time">12:00</div>
          <div class="lock-date">Мягмар, 3-р сарын 21</div>

          <div class="push">
            <div class="push-ic"><span class="pmark">VL</span></div>
            <div class="push-body">
              <div class="push-app">Vivid Lingua<span class="push-now">одоо</span></div>
              <div class="push-text">Өнөөдрийн давталт бэлэн боллоо</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="s12-notification"] .s12-stage {
        width: 1920px; height: 1080px; position: relative;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="s12-notification"] .ghost-word {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 580px; line-height: 0.8;
        letter-spacing: -0.04em; color: rgba(242,240,250,0.07); filter: blur(10px); white-space: nowrap;
        will-change: transform;
      }
      [data-composition-id="s12-notification"] .phone {
        position: relative; z-index: 2;
        width: 460px; height: 940px; border-radius: 60px;
        background: #0b0a1a; border: 10px solid #1c1936;
        box-shadow: 0 0 0 2px rgba(179,136,250,0.3), 0 50px 130px rgba(0,0,0,0.6);
        padding: 16px; box-sizing: border-box;
      }
      [data-composition-id="s12-notification"] .lockscreen {
        width: 100%; height: 100%; border-radius: 46px; overflow: hidden;
        background: radial-gradient(circle at 50% 30%, #2a1768 0%, #140a32 80%);
        display: flex; flex-direction: column; align-items: center; padding: 80px 28px 0; box-sizing: border-box;
      }
      [data-composition-id="s12-notification"] .lock-time {
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 108px; color: #f2f0fa; line-height: 1;
      }
      [data-composition-id="s12-notification"] .lock-date {
        font-family: "Golos Text", sans-serif; font-weight: 500; font-size: 30px; color: #cfc6f0; margin-top: 8px;
      }
      [data-composition-id="s12-notification"] .push {
        margin-top: 70px; width: 100%;
        background: rgba(255,255,255,0.12); backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.18); border-radius: 26px; padding: 24px 26px;
        display: flex; gap: 18px; align-items: flex-start; will-change: transform, opacity;
      }
      [data-composition-id="s12-notification"] .push-ic {
        width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0;
        background: linear-gradient(135deg, #b388fa, #66aafd);
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="s12-notification"] .pmark {
        font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 26px; color: #fff;
      }
      [data-composition-id="s12-notification"] .push-app {
        font-family: "Golos Text", sans-serif; font-weight: 700; font-size: 28px; color: #f2f0fa;
        display: flex; justify-content: space-between; align-items: baseline;
      }
      [data-composition-id="s12-notification"] .push-now { font-size: 22px; color: #cfc6f0; font-weight: 500; }
      [data-composition-id="s12-notification"] .push-text {
        margin-top: 6px; font-family: "Golos Text", sans-serif; font-weight: 500; font-size: 28px;
        color: #eae5fb; line-height: 1.3;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s12-notification"] ' + s;

        tl.from(q(".phone"), { y: 80, opacity: 0, scale: 0.96, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.1);
        tl.set(q(".push"), { opacity: 0, y: -60 });
        // push slides down with a spring after a beat.
        tl.to(q(".push"), { opacity: 1, y: 0, duration: 0.6, ease: "cubic-bezier(0.34,1.56,0.64,1)" }, 1.2);
        // subtle push nudge to draw attention.
        tl.to(q(".push"), { y: -8, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.2);
        // ghost wordmark drifts slowly.
        tl.fromTo(q(".ghost-word"), { x: -50 }, { x: 50, duration: 5, ease: "sine.inOut" }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["s12-notification"] = tl;
      })();
    </script>
  </div>
</template>
