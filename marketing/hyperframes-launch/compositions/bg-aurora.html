<template id="bg-aurora-template">
  <div data-composition-id="bg-aurora" data-width="1920" data-height="1080" data-duration="70">
    <div class="bg-root">
      <!-- Dark aurora wash (default) -->
      <div class="layer dark-layer">
        <div class="aurora aurora-a" data-layout-ignore></div>
        <div class="aurora aurora-b" data-layout-ignore></div>
        <div class="aurora aurora-c" data-layout-ignore></div>
      </div>
      <!-- Light lavender wash (beats 5–7, 13–14) -->
      <div class="layer light-layer">
        <div class="wash light-a" data-layout-ignore></div>
        <div class="wash light-b" data-layout-ignore></div>
      </div>
      <!-- Violet wash (beat 12, beat 15) -->
      <div class="layer violet-layer">
        <div class="wash violet-a" data-layout-ignore></div>
        <div class="wash violet-b" data-layout-ignore></div>
      </div>
      <div class="grain"></div>
    </div>

    <style>
      [data-composition-id="bg-aurora"] .bg-root {
        width: 1920px;
        height: 1080px;
        background: #060512;
        position: relative;
        overflow: hidden;
      }
      [data-composition-id="bg-aurora"] .layer {
        position: absolute;
        inset: 0;
        will-change: opacity;
      }
      [data-composition-id="bg-aurora"] .light-layer,
      [data-composition-id="bg-aurora"] .violet-layer {
        opacity: 0;
      }
      [data-composition-id="bg-aurora"] .aurora {
        position: absolute;
        border-radius: 50%;
        filter: blur(150px);
        opacity: 0.55;
        will-change: transform;
      }
      /* Radial glows only (linear gradients band in H.264) */
      [data-composition-id="bg-aurora"] .aurora-a {
        width: 1100px;
        height: 1100px;
        top: -260px;
        left: -200px;
        background: radial-gradient(circle, #b388fa 0%, rgba(179, 136, 250, 0) 70%);
      }
      [data-composition-id="bg-aurora"] .aurora-b {
        width: 1000px;
        height: 1000px;
        bottom: -240px;
        right: -220px;
        background: radial-gradient(circle, #66aafd 0%, rgba(102, 170, 253, 0) 70%);
        opacity: 0.45;
      }
      [data-composition-id="bg-aurora"] .aurora-c {
        width: 820px;
        height: 820px;
        top: 420px;
        left: 720px;
        background: radial-gradient(circle, #fb6d8e 0%, rgba(251, 109, 142, 0) 70%);
        opacity: 0.32;
      }
      /* Light lavender field */
      [data-composition-id="bg-aurora"] .light-layer {
        background: radial-gradient(circle at 50% 38%, #f4f0fd 0%, #e6dcfa 70%);
      }
      [data-composition-id="bg-aurora"] .wash {
        position: absolute;
        border-radius: 50%;
        filter: blur(160px);
        will-change: transform;
      }
      [data-composition-id="bg-aurora"] .light-a {
        width: 1000px;
        height: 1000px;
        top: -200px;
        right: -150px;
        background: radial-gradient(circle, rgba(179, 136, 250, 0.35) 0%, rgba(179, 136, 250, 0) 70%);
      }
      [data-composition-id="bg-aurora"] .light-b {
        width: 900px;
        height: 900px;
        bottom: -260px;
        left: -160px;
        background: radial-gradient(circle, rgba(102, 170, 253, 0.28) 0%, rgba(102, 170, 253, 0) 70%);
      }
      /* Violet field */
      [data-composition-id="bg-aurora"] .violet-layer {
        background: radial-gradient(circle at 50% 45%, #2a1768 0%, #140a32 75%);
      }
      [data-composition-id="bg-aurora"] .violet-a {
        width: 1200px;
        height: 1200px;
        top: -200px;
        left: 360px;
        background: radial-gradient(circle, rgba(179, 136, 250, 0.55) 0%, rgba(179, 136, 250, 0) 68%);
      }
      [data-composition-id="bg-aurora"] .violet-b {
        width: 900px;
        height: 900px;
        bottom: -240px;
        right: -120px;
        background: radial-gradient(circle, rgba(102, 170, 253, 0.4) 0%, rgba(102, 170, 253, 0) 70%);
      }
      [data-composition-id="bg-aurora"] .grain {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.02), transparent 60%);
        mix-blend-mode: screen;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="bg-aurora"] ' + s;
        const a = q(".aurora-a");
        const b = q(".aurora-b");
        const c = q(".aurora-c");
        const dark = q(".dark-layer");
        const light = q(".light-layer");
        const violet = q(".violet-layer");

        // Continuous slow drift of dark aurora across the full 70s.
        tl.to(a, { x: 220, y: 150, duration: 35, ease: "sine.inOut" }, 0);
        tl.to(a, { x: 0, y: 0, duration: 35, ease: "sine.inOut" }, 35);
        tl.to(b, { x: -200, y: -130, duration: 35, ease: "sine.inOut" }, 0);
        tl.to(b, { x: 0, y: 0, duration: 35, ease: "sine.inOut" }, 35);
        tl.to(c, { x: 160, y: -110, scale: 1.2, duration: 35, ease: "sine.inOut" }, 0);
        tl.to(c, { x: 0, y: 0, scale: 1, duration: 35, ease: "sine.inOut" }, 35);

        // Light/violet wash drift (always moving while visible).
        tl.to(q(".light-a"), { x: -140, y: 90, duration: 16, ease: "sine.inOut", yoyo: true, repeat: 1 }, 14);
        tl.to(q(".light-b"), { x: 120, y: -80, duration: 16, ease: "sine.inOut", yoyo: true, repeat: 1 }, 14);
        tl.to(q(".violet-a"), { x: -120, y: 80, duration: 9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 48);
        tl.to(q(".violet-b"), { x: 100, y: -70, duration: 9, ease: "sine.inOut", yoyo: true, repeat: 1 }, 48);

        // ---- Mode schedule (crossfade radial washes at beat boundaries) ----
        const MF = 0.45; // mode-fade duration, matches master crossfade

        // Beat 5 (14s): dark -> light
        tl.to(light, { opacity: 1, duration: MF, ease: "power2.inOut" }, 14 - MF);
        tl.to(dark, { opacity: 0, duration: MF, ease: "power2.inOut" }, 14 - MF);

        // Beat 8 (30s): light -> dark
        tl.to(light, { opacity: 0, duration: MF, ease: "power2.inOut" }, 30 - MF);
        tl.to(dark, { opacity: 1, duration: MF, ease: "power2.inOut" }, 30 - MF);

        // Beat 12 (48s): dark -> violet
        tl.to(violet, { opacity: 1, duration: MF, ease: "power2.inOut" }, 48 - MF);
        tl.to(dark, { opacity: 0, duration: MF, ease: "power2.inOut" }, 48 - MF);

        // Beat 13 (53s): violet -> light
        tl.to(violet, { opacity: 0, duration: MF, ease: "power2.inOut" }, 53 - MF);
        tl.to(light, { opacity: 1, duration: MF, ease: "power2.inOut" }, 53 - MF);

        // Beat 15 (62s): light -> violet
        tl.to(light, { opacity: 0, duration: MF, ease: "power2.inOut" }, 62 - MF);
        tl.to(violet, { opacity: 1, duration: MF, ease: "power2.inOut" }, 62 - MF);

        // Beat 16 (66s): violet -> dark (outro fades to black)
        tl.to(violet, { opacity: 0, duration: 0.8, ease: "power2.inOut" }, 66 - 0.4);
        tl.to(dark, { opacity: 1, duration: 0.8, ease: "power2.inOut" }, 66 - 0.4);
        // Final settle to near-black for the outro lockup frame.
        tl.to([a, b, c], { opacity: 0.18, duration: 1.6, ease: "power1.inOut" }, 66.5);

        window.__timelines = window.__timelines || {};
        window.__timelines["bg-aurora"] = tl;
      })();
    </script>
  </div>
</template>
