<template id="s11-chat-template">
  <div data-composition-id="s11-chat" data-width="1920" data-height="1080" data-duration="7">
    <div class="s11-stage">
      <div class="chat-head">
        <div class="ch-spark">
          <svg viewBox="0 0 100 100" width="40" height="40"><path d="M50 6 L58 42 L94 50 L58 58 L50 94 L42 58 L6 50 L42 42 Z" fill="#b388fa"/></svg>
        </div>
        <div class="ch-name">AI багш</div>
      </div>

      <!-- rotating suggested prompts -->
      <div class="prompts">
        <div class="prompt pr1">«"der, die, das"-г хэзээ хэрэглэх вэ?»</div>
        <div class="prompt pr2">«Өнөөдөр ямар үг давтах вэ?»</div>
        <div class="prompt pr3">«Миний түвшин хэд вэ?»</div>
      </div>

      <!-- answer card -->
      <div class="answer">
        <div class="ans-spark" data-layout-ignore>
          <svg viewBox="0 0 100 100" width="56" height="56"><path d="M50 6 L58 42 L94 50 L58 58 L50 94 L42 58 L6 50 L42 42 Z" fill="#b388fa"/></svg>
        </div>
        <div class="ans-text">«der», «die», «das» нь үгийн хүйсээс хамаарна.</div>
        <div class="ans-word">
          <span class="aw-de">der Zug</span>
          <span class="aw-mn">галт тэрэг</span>
        </div>
      </div>

      <!-- input bar -->
      <div class="inputbar">
        <span class="inp-text" id="s11-typed"></span>
        <span class="inp-caret" data-layout-ignore></span>
        <span class="inp-count">0/1000</span>
        <span class="inp-send">
          <svg viewBox="0 0 24 24" width="26" height="26"><path d="M4 12 L20 4 L14 20 L11 13 Z" fill="#060512"/></svg>
        </span>
      </div>

      <!-- flying sparkle on dotted path -->
      <div class="fly-spark" data-layout-ignore>
        <svg viewBox="0 0 100 100" width="38" height="38"><path d="M50 6 L58 42 L94 50 L58 58 L50 94 L42 58 L6 50 L42 42 Z" fill="#66aafd"/></svg>
      </div>
    </div>

    <style>
      [data-composition-id="s11-chat"] .s11-stage {
        width: 1920px; height: 1080px; display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 30px; position: relative; padding: 0 360px; box-sizing: border-box;
      }
      [data-composition-id="s11-chat"] .chat-head { display: flex; align-items: center; gap: 16px; }
      [data-composition-id="s11-chat"] .ch-spark { filter: drop-shadow(0 0 16px rgba(179,136,250,0.7)); }
      [data-composition-id="s11-chat"] .ch-name {
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 44px; color: #f2f0fa;
      }
      [data-composition-id="s11-chat"] .prompts { position: relative; height: 80px; width: 100%; }
      [data-composition-id="s11-chat"] .prompt {
        position: absolute; left: 50%; top: 0; transform: translateX(-50%);
        background: rgba(179,136,250,0.1); border: 1px solid rgba(179,136,250,0.35); border-radius: 999px;
        padding: 20px 40px; font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 32px;
        color: #d8d2f0; white-space: nowrap;
      }
      [data-composition-id="s11-chat"] .answer {
        width: 100%; background: rgba(21,19,43,0.9); border: 1px solid rgba(179,136,250,0.35);
        border-radius: 28px; padding: 40px 46px; display: flex; flex-direction: column; gap: 22px; position: relative;
        box-shadow: 0 30px 90px rgba(0,0,0,0.5);
      }
      [data-composition-id="s11-chat"] .ans-spark {
        position: absolute; top: -28px; left: 40px; filter: drop-shadow(0 0 20px rgba(179,136,250,0.8));
        will-change: transform;
      }
      [data-composition-id="s11-chat"] .ans-text {
        font-family: "Golos Text", sans-serif; font-weight: 500; font-size: 38px; line-height: 1.4; color: #f2f0fa;
        margin-top: 12px;
      }
      [data-composition-id="s11-chat"] .ans-word {
        display: flex; align-items: center; gap: 24px;
        background: #0b0a1a; border-radius: 20px; padding: 24px 32px; align-self: flex-start;
      }
      [data-composition-id="s11-chat"] .aw-de {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 44px; color: #f2f0fa;
      }
      [data-composition-id="s11-chat"] .aw-mn { font-size: 38px; color: #66aafd; font-weight: 600; }
      [data-composition-id="s11-chat"] .inputbar {
        width: 100%; display: flex; align-items: center; gap: 16px;
        background: #15132b; border: 1px solid rgba(131,126,168,0.35); border-radius: 22px; padding: 24px 30px;
      }
      [data-composition-id="s11-chat"] .inp-text {
        font-family: "Golos Text", sans-serif; font-weight: 500; font-size: 32px; color: #f2f0fa; flex-shrink: 0;
      }
      [data-composition-id="s11-chat"] .inp-caret {
        width: 4px; height: 38px; background: #b388fa; border-radius: 2px; flex-shrink: 0;
      }
      [data-composition-id="s11-chat"] .inp-count {
        margin-left: auto; font-size: 26px; color: #837ea8; font-weight: 600;
      }
      [data-composition-id="s11-chat"] .inp-send {
        width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #b388fa, #66aafd);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      [data-composition-id="s11-chat"] .fly-spark {
        position: absolute; top: 300px; left: 520px; filter: drop-shadow(0 0 16px rgba(102,170,253,0.8));
        will-change: transform; opacity: 0;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s11-chat"] ' + s;

        // Initial states.
        tl.set(q(".pr1"), { opacity: 1, y: 0 });
        tl.set([q(".pr2"), q(".pr3")], { opacity: 0, y: 20 });
        tl.set(q(".answer"), { opacity: 0, y: 40, scale: 0.96 });
        tl.set(q(".ans-spark"), { scale: 0 });

        tl.from(q(".chat-head"), { y: -30, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.1);

        // Rotate suggested prompts (1 -> 2 -> 3).
        tl.to(q(".pr1"), { opacity: 0, y: -20, duration: 0.35, ease: "power2.in" }, 1.1);
        tl.to(q(".pr2"), { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 1.4);
        tl.to(q(".pr2"), { opacity: 0, y: -20, duration: 0.35, ease: "power2.in" }, 2.3);
        tl.to(q(".pr3"), { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" }, 2.6);

        // Sparkle flies along a dotted path (deterministic keyframed arc) into the input.
        tl.set(q(".fly-spark"), { opacity: 1 }, 2.9);
        tl.to(q(".fly-spark"), { left: 760, top: 380, duration: 0.4, ease: "sine.inOut" }, 2.9);
        tl.to(q(".fly-spark"), { left: 1040, top: 560, duration: 0.4, ease: "sine.inOut" }, 3.3);
        tl.to(q(".fly-spark"), { left: 1320, top: 700, duration: 0.4, ease: "sine.inOut" }, 3.7);
        tl.to(q(".fly-spark"), { scale: 0, opacity: 0, duration: 0.25, ease: "power2.in" }, 4.05);
        tl.to(q(".pr3"), { opacity: 0, y: -20, duration: 0.3, ease: "power2.in" }, 3.0);

        // Question types into the input (char-by-char).
        const typed = document.querySelector(q("#s11-typed"));
        const countEl = document.querySelector(q(".inp-count"));
        const text = "der, die, das-г хэзээ хэрэглэх вэ?";
        const chars = text.split("");
        chars.forEach((ch, i) => {
          tl.call(() => {
            typed.textContent = text.slice(0, i + 1);
            countEl.textContent = (i + 1) + "/1000";
          }, null, 3.5 + i * 0.06);
        });

        // Send -> answer card with sparkle blob morph.
        tl.to(q(".inp-send"), { scale: 0.85, duration: 0.12, yoyo: true, repeat: 1, ease: "power1.inOut" }, 5.55);
        tl.to(q(".answer"), { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "cubic-bezier(0.22,1,0.36,1)" }, 5.7);
        // Sparkle blob morphs in (scale + rotate spin).
        tl.fromTo(q(".ans-spark"), { scale: 0, rotation: -90 }, { scale: 1, rotation: 0, duration: 0.6, ease: "back.out(1.8)", transformOrigin: "50% 50%" }, 5.8);
        tl.from(q(".ans-text"), { opacity: 0, y: 20, duration: 0.45, ease: "power2.out" }, 6.0);
        tl.from(q(".ans-word"), { opacity: 0, y: 24, scale: 0.95, duration: 0.5, ease: "back.out(1.5)" }, 6.3);
        // continuous gentle sparkle spin
        tl.to(q(".ans-spark"), { rotation: 90, duration: 1.2, ease: "sine.inOut", transformOrigin: "50% 50%" }, 6.4);

        window.__timelines = window.__timelines || {};
        window.__timelines["s11-chat"] = tl;
      })();
    </script>
  </div>
</template>
