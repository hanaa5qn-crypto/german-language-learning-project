<template id="s08-cascade-template">
  <div data-composition-id="s08-cascade" data-width="1920" data-height="1080" data-duration="3">
    <div class="s8-stage">
      <div class="deck">
        <!-- home -->
        <div class="ppanel p1">
          <div class="pp-head">Нүүр</div>
          <div class="pp-greet">Сайн уу, Болд</div>
          <div class="pp-card"><div class="pp-de">die Schule</div><div class="pp-mn">сургууль</div></div>
          <div class="pp-row"><span>Тест</span><span>Флашкарт</span></div>
        </div>
        <!-- flashcards -->
        <div class="ppanel p2">
          <div class="pp-head">Флашкарт</div>
          <div class="pp-flash"><div class="pp-de big">der Zug</div><div class="pp-mn">галт тэрэг</div></div>
          <div class="pp-srs">Давтах · 1д · 3х · 7х</div>
        </div>
        <!-- test -->
        <div class="ppanel p3">
          <div class="pp-head">Тест</div>
          <div class="pp-q">«Ich ___ Deutsch.»</div>
          <div class="pp-ans"><span class="ok">spreche</span><span>sprichst</span></div>
          <div class="pp-badge">B1</div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="s08-cascade"] .s8-stage {
        width: 1920px; height: 1080px; display: flex; align-items: center; justify-content: center;
        perspective: 2000px;
      }
      [data-composition-id="s08-cascade"] .deck {
        position: relative; width: 1200px; height: 700px; transform-style: preserve-3d;
      }
      [data-composition-id="s08-cascade"] .ppanel {
        position: absolute; width: 460px; height: 640px; top: 30px;
        background: #15132b; border: 1px solid rgba(179,136,250,0.3); border-radius: 40px;
        box-shadow: 0 40px 110px rgba(0,0,0,0.6), 0 0 0 1px rgba(179,136,250,0.15);
        padding: 50px 42px; display: flex; flex-direction: column; gap: 28px; will-change: transform;
      }
      [data-composition-id="s08-cascade"] .p1 { left: 60px; }
      [data-composition-id="s08-cascade"] .p2 { left: 370px; }
      [data-composition-id="s08-cascade"] .p3 { left: 680px; }
      [data-composition-id="s08-cascade"] .pp-head {
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 34px; color: #b388fa;
      }
      [data-composition-id="s08-cascade"] .pp-greet {
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 40px; color: #f2f0fa;
      }
      [data-composition-id="s08-cascade"] .pp-card, [data-composition-id="s08-cascade"] .pp-flash {
        background: #0b0a1a; border: 1px solid rgba(131,126,168,0.3); border-radius: 26px; padding: 36px 30px;
        display: flex; flex-direction: column; gap: 12px; align-items: center;
      }
      [data-composition-id="s08-cascade"] .pp-de { font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 46px; color: #f2f0fa; }
      [data-composition-id="s08-cascade"] .pp-de.big { font-size: 56px; }
      [data-composition-id="s08-cascade"] .pp-mn { font-size: 34px; color: #66aafd; font-weight: 600; }
      [data-composition-id="s08-cascade"] .pp-row, [data-composition-id="s08-cascade"] .pp-ans {
        display: flex; gap: 18px;
      }
      [data-composition-id="s08-cascade"] .pp-row span, [data-composition-id="s08-cascade"] .pp-ans span {
        flex: 1; text-align: center; background: #0b0a1a; border: 1px solid rgba(131,126,168,0.3);
        border-radius: 18px; padding: 22px 0; font-size: 28px; color: #a8a3c8; font-weight: 600;
      }
      [data-composition-id="s08-cascade"] .pp-ans .ok { border-color: #66aafd; color: #66aafd; }
      [data-composition-id="s08-cascade"] .pp-srs { color: #b388fa; font-size: 28px; font-weight: 600; text-align: center; }
      [data-composition-id="s08-cascade"] .pp-q { font-size: 38px; color: #f2f0fa; font-weight: 600; }
      [data-composition-id="s08-cascade"] .pp-badge {
        align-self: center; font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 58px; color: #060512;
        background: linear-gradient(135deg, #b388fa, #66aafd); border-radius: 22px; padding: 14px 50px; margin-top: auto;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s08-cascade"] ' + s;

        // Resting perspective stagger.
        tl.set(q(".p1"), { rotationY: 18, z: -120, y: 40 });
        tl.set(q(".p2"), { rotationY: 6, z: 0, y: 0 });
        tl.set(q(".p3"), { rotationY: -10, z: -80, y: 30 });

        tl.from(q(".p1"), { x: -260, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.1);
        tl.from(q(".p2"), { y: 200, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.3);
        tl.from(q(".p3"), { x: 260, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.5);

        // Slow drift of the whole deck.
        tl.to(q(".deck"), { rotationY: 8, duration: 3, ease: "sine.inOut", transformOrigin: "50% 50%" }, 0.8);

        window.__timelines = window.__timelines || {};
        window.__timelines["s08-cascade"] = tl;
      })();
    </script>
  </div>
</template>
