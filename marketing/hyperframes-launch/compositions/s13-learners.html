<template id="s13-learners-template">
  <div data-composition-id="s13-learners" data-width="1920" data-height="1080" data-duration="5">
    <div class="s13-stage">
      <div class="collage">
        <!-- mini app-screen cards + gradient tiles -->
        <div class="tile screen ti1">
          <div class="ts-head">Флашкарт</div>
          <div class="ts-de">die Reise</div><div class="ts-mn">аялал</div>
        </div>
        <div class="tile grad tg1"></div>
        <div class="tile screen ti2">
          <div class="ts-head">Тест</div>
          <div class="ts-q">Ich ___ Deutsch.</div><div class="ts-mn">B1</div>
        </div>
        <div class="tile grad tg2"></div>
        <div class="tile screen ti3">
          <div class="ts-head">Ахиц</div>
          <div class="ts-de">A1 → C2</div><div class="ts-mn">99%</div>
        </div>
        <div class="tile grad tg3"></div>
      </div>

      <div class="center-label">
        <div class="cl-chips">
          <span class="cl-chip">Оюутан</span>
          <span class="cl-chip">Ажилтан</span>
          <span class="cl-chip">Аялагч</span>
        </div>
        <div class="cl-title">Хэн ч сурч чадна</div>
      </div>
    </div>

    <style>
      [data-composition-id="s13-learners"] .s13-stage {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="s13-learners"] .collage { position: absolute; inset: 0; }
      [data-composition-id="s13-learners"] .tile {
        position: absolute; border-radius: 28px; box-shadow: 0 30px 80px rgba(75,50,140,0.22); will-change: transform, opacity;
      }
      [data-composition-id="s13-learners"] .screen {
        background: #fff; border: 1px solid #ece4fb; padding: 30px 32px;
        display: flex; flex-direction: column; gap: 8px;
      }
      [data-composition-id="s13-learners"] .ts-head {
        font-family: "Golos Text", sans-serif; font-weight: 700; font-size: 24px; color: #b388fa;
      }
      [data-composition-id="s13-learners"] .ts-de {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 36px; color: #241c44;
      }
      [data-composition-id="s13-learners"] .ts-q { font-size: 28px; color: #241c44; font-weight: 600; }
      [data-composition-id="s13-learners"] .ts-mn { font-size: 30px; color: #66aafd; font-weight: 700; }
      [data-composition-id="s13-learners"] .grad { background: linear-gradient(135deg, #b388fa, #66aafd); }
      [data-composition-id="s13-learners"] .tg2 { background: linear-gradient(135deg, #66aafd, #fb6d8e); }
      [data-composition-id="s13-learners"] .tg3 { background: linear-gradient(135deg, #fb6d8e, #b388fa); }

      [data-composition-id="s13-learners"] .ti1 { width: 320px; height: 240px; top: 130px; left: 200px; }
      [data-composition-id="s13-learners"] .tg1 { width: 200px; height: 200px; top: 150px; right: 260px; }
      [data-composition-id="s13-learners"] .ti2 { width: 320px; height: 240px; bottom: 130px; left: 260px; }
      [data-composition-id="s13-learners"] .tg2 { width: 220px; height: 220px; bottom: 150px; right: 240px; }
      [data-composition-id="s13-learners"] .ti3 { width: 300px; height: 230px; top: 300px; right: 180px; }
      [data-composition-id="s13-learners"] .tg3 { width: 180px; height: 180px; bottom: 360px; left: 160px; }

      [data-composition-id="s13-learners"] .center-label {
        position: relative; z-index: 5; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 26px;
        background: rgba(244,240,253,0.7); border-radius: 32px; padding: 44px 70px;
        backdrop-filter: blur(6px);
      }
      [data-composition-id="s13-learners"] .cl-chips { display: flex; gap: 16px; }
      [data-composition-id="s13-learners"] .cl-chip {
        background: #fff; border: 1px solid #e6dcfa; color: #5b3fa0; border-radius: 999px;
        padding: 14px 32px; font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 30px;
        box-shadow: 0 8px 24px rgba(120,90,200,0.12);
      }
      [data-composition-id="s13-learners"] .cl-title {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 80px; letter-spacing: -0.02em; color: #241c44;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s13-learners"] ' + s;

        // Tiles fly from corners.
        const flies = [
          [".ti1", -500, -400], [".tg1", 500, -400], [".ti2", -500, 400],
          [".tg2", 500, 400], [".ti3", 560, -120], [".tg3", -560, 200],
        ];
        flies.forEach(([sel, dx, dy], i) => {
          tl.from(q(sel), { x: dx, y: dy, opacity: 0, rotation: dx > 0 ? 8 : -8, duration: 0.8, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.1 + i * 0.08);
        });

        tl.from(q(".center-label"), { scale: 0.85, opacity: 0, duration: 0.6, ease: "back.out(1.5)" }, 0.7);
        tl.from(q(".cl-chip"), { y: 24, opacity: 0, duration: 0.4, ease: "back.out(1.6)", stagger: 0.1 }, 1.0);
        tl.from(q(".cl-title"), { y: 30, opacity: 0, duration: 0.5, ease: "power3.out" }, 1.2);

        // Gentle float on tiles afterward.
        const floats = [[".ti1", 14, -14],[".tg1", -12, 16],[".ti2", 12, 12],[".tg2", -14, -12],[".ti3", -16, 14],[".tg3", 14, -16]];
        floats.forEach(([sel, dx, dy]) => {
          tl.to(q(sel), { x: dx, y: dy, duration: 2.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.6);
        });

        window.__timelines = window.__timelines || {};
        window.__timelines["s13-learners"] = tl;
      })();
    </script>
  </div>
</template>
