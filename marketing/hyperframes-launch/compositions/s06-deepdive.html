    <style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s06-deepdive"] ' + s;
        const pa = q(".pa"), pb = q(".pb"), pc = q(".pc"), cur = q(".cursor");

        // Panels b & c start off to the right.
        tl.set(pb, { xPercent: 120, opacity: 0 });
        tl.set(pc, { xPercent: 120, opacity: 0 });
        tl.set(q(".flip"), { rotationY: 0 });

        // ===== (a) lesson list, click "Reisen — Аялал" (0–3s) =====
        tl.from(pa + " .p-title", { y: -30, opacity: 0, duration: 0.4, ease: "power3.out" }, 0.1);
        tl.from(pa + " .lesson", { y: 30, opacity: 0, duration: 0.4, ease: "power2.out", stagger: 0.1 }, 0.25);
        // cursor glides to the "Reisen" row
        tl.to(cur, { left: 780, top: 360, duration: 0.9, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.8);
        // click depress + row highlight
        tl.to(cur, { scale: 0.82, duration: 0.12, yoyo: true, repeat: 1, ease: "power1.inOut", transformOrigin: "0 0" }, 1.8);
        tl.to(pa + " .lesson.hot", { backgroundColor: "#ece4fb", boxShadow: "0 0 0 3px #b388fa", scale: 1.02, duration: 0.3, ease: "power2.out" }, 1.9);

        // transition a -> b (~3s)
        tl.to(pa, { xPercent: -120, opacity: 0, duration: 0.5, ease: "power2.inOut" }, 2.9);
        tl.to(pb, { xPercent: 0, opacity: 1, duration: 0.5, ease: "power2.inOut" }, 2.9);

        // ===== (b) flashcard flip die Reise -> аялал (3–6s) =====
        tl.from(pb + " .flip-wrap", { y: 40, opacity: 0, duration: 0.45, ease: "power3.out" }, 3.3);
        // cursor to card, click to flip
        tl.to(cur, { left: 960, top: 470, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 3.5);
        tl.to(cur, { scale: 0.82, duration: 0.12, yoyo: true, repeat: 1, ease: "power1.inOut", transformOrigin: "0 0" }, 4.2);
        tl.to(q(".flip"), { rotationY: 180, duration: 0.7, ease: "cubic-bezier(0.34,1.56,0.64,1)" }, 4.3);
        // SRS chips appear, cursor taps "Сайн"
        tl.from(pb + " .chip", { y: 24, opacity: 0, duration: 0.4, ease: "back.out(1.6)", stagger: 0.08 }, 5.1);
        tl.to(cur, { left: 1010, top: 600, duration: 0.6, ease: "cubic-bezier(0.22,1,0.36,1)" }, 5.2);
        tl.to(pb + " .chip.good", { scale: 1.12, duration: 0.2, yoyo: true, repeat: 1, ease: "power2.out" }, 5.7);

        // transition b -> c (~6s)
        tl.to(pb, { xPercent: -120, opacity: 0, duration: 0.5, ease: "power2.inOut" }, 5.95);
        tl.to(pc, { xPercent: 0, opacity: 1, duration: 0.5, ease: "power2.inOut" }, 5.95);

        // ===== (c) placement test -> B1 badge (6–9s) =====
        tl.from(pc + " .q-card", { y: 40, opacity: 0, duration: 0.45, ease: "power3.out" }, 6.35);
        tl.to(cur, { left: 760, top: 520, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 6.5);
        tl.to(cur, { scale: 0.82, duration: 0.12, yoyo: true, repeat: 1, ease: "power1.inOut", transformOrigin: "0 0" }, 7.2);
        tl.to(pc + " .ans.pick", { borderColor: "#b388fa", backgroundColor: "#f4f0fd", color: "#5b3fa0", duration: 0.3, ease: "power2.out" }, 7.3);
        tl.from(pc + " .lvl-badge", { scale: 0, opacity: 0, duration: 0.6, ease: "back.out(1.8)" }, 7.9);
        tl.to(cur, { opacity: 0, duration: 0.3 }, 7.9);

        window.__timelines = window.__timelines || {};
        window.__timelines["s06-deepdive"] = tl;
      })();
    </script>
