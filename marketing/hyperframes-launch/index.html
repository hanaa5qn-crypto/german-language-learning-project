        font-weight: 400 900;
        font-display: block;
        src: url("assets/fonts/GolosText-latin.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+2000-206F, U+2122, U+2191, U+2193;
      }
      @font-face {
        font-family: "Golos Text";
        font-weight: 400 900;

        src: url("assets/fonts/GolosText-cyrillic.woff2") format("woff2");
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }
      @font-face {

        font-weight: 400 900;
        font-display: block;
        src: url("assets/fonts/GolosText-cyrillicExt.woff2") format("woff2");

    <script>
      // Master timeline: 0.45s crossfade at each beat boundary (transition = exit).
      // Giant-type beats 3 & 10 ride track 2 ABOVE neighbours and self-animate
      // (slide across without crossfade), so they are NOT cross-faded here.
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      const xfade = 0.45;
      function crossOut(sel, at) {
        mainTl.to(sel, { opacity: 0, duration: xfade, ease: "power2.inOut" }, at - xfade);
      }

      // Crossfade the OUTGOING track-1 scene out as the next mounts at the boundary.
      crossOut("#s01", 5);
      crossOut("#s02", 8);
      crossOut("#s04", 14);
      crossOut("#s05", 18);
      crossOut("#s06", 27);
      crossOut("#s07", 30);
      crossOut("#s08", 33);
      crossOut("#s09", 38);
      crossOut("#s11", 48);
      crossOut("#s12", 53);
      crossOut("#s13", 58);
      crossOut("#s14", 62);
      // s15 runs to the end (black-frame outro), no crossOut.

      window.__timelines["main"] = mainTl;
    </script>
  </body>
</html>
