<template id="s12-notification-template">
  <div data-composition-id="s12-notification" data-width="1080" data-height="1920" data-duration="5">
    <div class="s12-stage" data-layout-allow-overflow>
      <div class="ghost-word" data-layout-ignore data-layout-allow-overflow>Lingua</div>

      <div class="phone" data-layout-ignore>
        <div class="lockscreen">
          <div class="lock-time">12:00</div>
          <div class="lock-date">Мягмар, 3-р сарын 21</div>

          <div class="push" data-layout-ignore>
            <div class="push-ic"><span class="pmark">VL</span></div>
            <div class="push-body">
              <div class="push-app">Vivid Lingua<span class="push-now">одоо</span></div>
              <div class="push-text">Өнөөдрийн давталт бэлэн боллоо</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="s12-notification"] .s12-stage {
        width: 1080px; height: 1920px; position: relative;
        display: flex; align-items: center; justify-content: center;
      }
      [data-composition-id="s12-notification"] .ghost-word {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 340px; line-height: 0.8;
        letter-spacing: -0.04em; color: rgba(242,240,250,0.07); filter: blur(10px); white-space: nowrap;
        will-change: transform; pointer-events: none; z-index: 1;
      }
      [data-composition-id="s12-notification"] .phone {
        width: 520px; height: 960px; background: #0b0a1a; border-radius: 48px;
        border: 12px solid #241c44; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
        position: relative; overflow: hidden; z-index: 2;
        background-image: radial-gradient(circle at 50% 30%, #15132b 0%, #060512 80%);
      }
      [data-composition-id="s12-notification"] .lockscreen {
        position: absolute; inset: 0; padding: 120px 30px;
        display: flex; flex-direction: column; align-items: center;
      }
      [data-composition-id="s12-notification"] .lock-time {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 120px;
        color: #f2f0fa; text-shadow: 0 0 40px rgba(242,240,250,0.3);
      }
      [data-composition-id="s12-notification"] .lock-date {
        font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 28px;
        color: #b388fa; margin-top: 10px;
      }
      [data-composition-id="s12-notification"] .push {
        width: 460px; background: rgba(21,19,43,0.88); border: 1.2px solid rgba(179,136,250,0.35);
        border-radius: 24px; padding: 22px 24px; display: flex; gap: 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4); margin-top: 160px;
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      }
      [data-composition-id="s12-notification"] .push-ic {
        width: 50px; height: 50px; border-radius: 12px;
        background: linear-gradient(135deg, #b388fa, #66aafd);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      [data-composition-id="s12-notification"] .pmark {
        font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 20px; color: #fff;
      }
      [data-composition-id="s12-notification"] .push-body { flex: 1; display: flex; flex-direction: column; }
      [data-composition-id="s12-notification"] .push-app {
        font-family: "Golos Text", sans-serif; font-weight: 700; font-size: 24px; color: #f2f0fa;
        display: flex; justify-content: space-between; align-items: baseline;
      }
      [data-composition-id="s12-notification"] .push-now { font-size: 18px; color: #cfc6f0; font-weight: 500; }
      [data-composition-id="s12-notification"] .push-text {
        margin-top: 6px; font-family: "Golos Text", sans-serif; font-weight: 500; font-size: 24px;
        color: #eae5fb; line-height: 1.35;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s12-notification"] ' + s;

        tl.from(q(".phone"), { y: 100, opacity: 0, scale: 0.96, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.1);
        tl.set(q(".push"), { opacity: 0, y: -60 });
        // push slides down with a spring after a beat.
        tl.to(q(".push"), { opacity: 1, y: 0, duration: 0.6, ease: "cubic-bezier(0.34,1.56,0.64,1)" }, 1.2);
        // subtle push nudge to draw attention.
        tl.to(q(".push"), { y: -8, duration: 0.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.2);
        // ghost wordmark drifts slowly.
        tl.fromTo(q(".ghost-word"), { x: -40 }, { x: 40, duration: 5, ease: "sine.inOut" }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["s12-notification"] = tl;
      })();
    </script>
  </div>
</template>
