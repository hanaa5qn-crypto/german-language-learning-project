    <style>

        width: 1080px;

        font-family: "Unbounded", sans-serif;

    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s03-giant-vivid"] ' + s;

        // Giant cropped wordmark sweeps top->bottom across the frame.
        // Enters from far top, settles centered, exits to the bottom.
        tl.fromTo(
          q(".giant"),
          { y: -1600, x: "-50%" },
          { y: -80, x: "-50%", duration: 1.4, ease: "cubic-bezier(0.22,1,0.36,1)" },
          0,
        );
        tl.to(q(".giant"), { y: 80, x: "-50%", duration: 0.7, ease: "sine.inOut" }, 1.4);
        tl.to(q(".giant"), { y: 1600, x: "-50%", duration: 0.9, ease: "cubic-bezier(0.55,0,0.55,0.2)" }, 2.1);

        window.__timelines = window.__timelines || {};
        window.__timelines["s03-giant-vivid"] = tl;
      })();
