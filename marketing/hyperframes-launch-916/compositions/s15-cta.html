<template id="s15-cta-template">
  <div data-composition-id="s15-cta" data-width="1080" data-height="1920" data-duration="8">
    <div class="s15-stage">
      <!-- Phase A (0–4s): logo zoom on violet — giant cropped VL mark -->
      <div class="phase-zoom">
        <div class="giant-mark" data-layout-ignore>
          <span class="gm-v">V</span><span class="gm-l">L</span>
        </div>
        <div class="zoom-tag">Эхэлцгээе</div>
      </div>

      <!-- Phase B (4–8s): particle globe -> black outro lockup -->
      <div class="phase-outro">
        <div class="globe" id="s15-globe" data-layout-ignore></div>
        <div class="lockup">
          <div class="lock-mark"><span class="lm-v">V</span><span class="lm-l">L</span></div>
          <div class="lock-word">Vivid Lingua</div>
          <div class="lock-tag">Өнөөдөр эхэл</div>
          <div class="lock-url">gridwave.me</div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="s15-cta"] .s15-stage {
        width: 1080px; height: 1920px; position: relative;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
      }
      [data-composition-id="s15-cta"] .phase-zoom,
      [data-composition-id="s15-cta"] .phase-outro {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      }
      /* Phase A */
      [data-composition-id="s15-cta"] .giant-mark {
        position: absolute; display: flex; align-items: center; will-change: transform, opacity;
        font-family: "Unbounded", sans-serif; font-weight: 800; line-height: 0.8;
      }
      [data-composition-id="s15-cta"] .gm-v, [data-composition-id="s15-cta"] .gm-l {
        font-size: 600px; color: #c9b0ff; text-shadow: 0 0 140px rgba(201,176,255,0.6);
      }
      [data-composition-id="s15-cta"] .gm-l { margin-left: -80px; margin-top: 140px; }
      [data-composition-id="s15-cta"] .zoom-tag {
        position: relative; z-index: 3;
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 80px; letter-spacing: -0.02em; color: #fff;
        text-shadow: 0 8px 40px rgba(0,0,0,0.4); will-change: transform, opacity;
      }
      /* Phase B */
      [data-composition-id="s15-cta"] .phase-outro { opacity: 0; }
      [data-composition-id="s15-cta"] .globe {
        position: absolute; width: 400px; height: 400px; top: 50%; left: 50%;
        transform: translate(-50%, -50%); will-change: transform, opacity;
      }
      [data-composition-id="s15-cta"] .gp {
        position: absolute; width: 6px; height: 6px; border-radius: 50%;
        background: #b388fa; box-shadow: 0 0 10px rgba(179,136,250,0.8); will-change: transform, opacity;
      }
      [data-composition-id="s15-cta"] .lockup {
        position: relative; z-index: 4; display: flex; flex-direction: column; align-items: center; gap: 24px; opacity: 0;
      }
      [data-composition-id="s15-cta"] .lock-mark {
        width: 130px; height: 130px; border-radius: 36px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #b388fa, #66aafd 55%, #fb6d8e);
        box-shadow: 0 30px 90px rgba(179,136,250,0.5); margin-bottom: 10px;
      }
      [data-composition-id="s15-cta"] .lm-v, [data-composition-id="s15-cta"] .lm-l {
        font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 72px; color: #060512; line-height: 0.8;
      }
      [data-composition-id="s15-cta"] .lm-l { margin-left: -12px; margin-top: 22px; }
      [data-composition-id="s15-cta"] .lock-word {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 68px; letter-spacing: -0.02em; color: #f2f0fa;
      }
      [data-composition-id="s15-cta"] .lock-tag {
        font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 38px; color: #a8a3c8;
      }
      [data-composition-id="s15-cta"] .lock-url {
        margin-top: 10px; font-family: "Golos Text", sans-serif; font-weight: 600; font-size: 34px;
        letter-spacing: 0.06em; color: #66aafd;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s15-cta"] ' + s;

        // ===== Phase A: logo zoom (0–4s) =====
        tl.fromTo(q(".giant-mark"), { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.0, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0);
        tl.to(q(".giant-mark"), { scale: 1.35, duration: 3.0, ease: "sine.inOut" }, 0.6);
        tl.from(q(".zoom-tag"), { y: 50, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.6);

        // Hand off to outro at ~4s: zoom phase pushes in + fades, outro fades up (this is the 62->66 violet boundary).
        tl.to(q(".giant-mark"), { scale: 2.4, opacity: 0, duration: 0.8, ease: "power2.in" }, 3.6);
        tl.to(q(".zoom-tag"), { scale: 1.4, opacity: 0, duration: 0.6, ease: "power2.in" }, 3.6);
        tl.to(q(".phase-outro"), { opacity: 1, duration: 0.6, ease: "power2.out" }, 3.8);

        // ===== Particle globe (deterministic, seeded LCG) =====
        let seed = 90210;
        function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
        const globe = document.querySelector(q("#s15-globe"));
        const N = 70, R = 180, cx = 200, cy = 200;
        const parts = [];
        for (let i = 0; i < N; i++) {
          // Even-ish sphere distribution via deterministic angles.
          const u = rnd(), v = rnd();
          const theta = 2 * Math.PI * u;
          const phi = Math.acos(2 * v - 1);
          const x = R * Math.sin(phi) * Math.cos(theta);
          const y = R * Math.sin(phi) * Math.sin(theta);
          const z = R * Math.cos(phi);
          const p = document.createElement("div");
          p.className = "gp";
          p.style.left = cx + "px";
          p.style.top = cy + "px";
          p.style.opacity = "0";
          globe.appendChild(p);
          parts.push({ el: p, x, y, z });
        }

        // Particles glow up and assemble into the globe (4.0–5.2s).
        parts.forEach((p, i) => {
          tl.fromTo(p.el,
            { opacity: 0, x: 0, y: 0, scale: 0 },
            { opacity: 0.95, x: p.x, y: p.y, scale: 1, duration: 0.5, ease: "cubic-bezier(0.22,1,0.36,1)" },
            4.0 + (i % 30) * 0.012);
        });

        // Rotate the globe (rotateY emulation by re-projecting along the deterministic driver).
        const driver = { a: 0 };
        tl.to(driver, {
          a: Math.PI * 1.4, duration: 2.2, ease: "sine.inOut",
          onUpdate: function () {
            const c = Math.cos(driver.a), s = Math.sin(driver.a);
            for (const p of parts) {
              const nx = p.x * c - p.z * s;
              const nz = p.x * s + p.z * c;
              const depth = (nz + R) / (2 * R); // 0..1
              p.el.style.transform = "translate(" + nx + "px," + p.y + "px) scale(" + (0.5 + depth) + ")";
              p.el.style.opacity = String(0.35 + depth * 0.6);
            }
          },
        }, 4.6);

        // Globe collapses/fades into the center as the lockup appears (~5.8s).
        tl.to(q("#s15-globe"), { scale: 0.4, opacity: 0, duration: 0.8, ease: "power2.in", transformOrigin: "50% 50%" }, 5.8);

        // Final black-frame lockup.
        tl.to(q(".lockup"), { opacity: 1, duration: 0.7, ease: "power2.out" }, 5.9);
        tl.from(q(".lock-mark"), { scale: 0, duration: 0.6, ease: "back.out(1.7)" }, 6.0);
        tl.from(q(".lock-word"), { y: 40, opacity: 0, duration: 0.5, ease: "power3.out" }, 6.3);
        tl.from(q(".lock-tag"), { y: 30, opacity: 0, duration: 0.45, ease: "power2.out" }, 6.5);
        tl.from(q(".lock-url"), { y: 24, opacity: 0, duration: 0.45, ease: "power2.out" }, 6.7);
        // Hold the final frame steady through 8s (subtle url pulse, stays visible).
        tl.to(q(".lock-url"), { opacity: 0.7, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 7.0);

        window.__timelines = window.__timelines || {};
        window.__timelines["s15-cta"] = tl;
      })();
    </script>
  </div>
</template>
