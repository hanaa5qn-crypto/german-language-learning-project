<template id="s08-cascade-template">
  <div data-composition-id="s08-cascade" data-width="1080" data-height="1920" data-duration="3">
    <div class="s8-stage">
      <div class="deck" data-layout-ignore>
        <!-- home -->
        <div class="ppanel p1">
          <div class="pp-head">Нүүр</div>
          <div class="pp-greet">Сайн уу, Болд</div>
          <div class="pp-card"><div class="pp-de">die Schule</div><div class="pp-mn">сургууль</div></div>
          <div class="pp-row"><span>Тест</span><span>Флашкарт</span></div>
        </div>
        <!-- flashcards -->
        <div class="ppanel p2">
          <div class="pp-head">Флашкарт</div>

          <div class="pp-badge">B1</div>

    </div>

    <style>
      [data-composition-id="s08-cascade"] .s8-stage {
        width: 1080px; height: 1920px; display: flex; align-items: center; justify-content: center;
        perspective: 2000px; position: relative;
      }
      [data-composition-id="s08-cascade"] .deck {
        width: 380px; height: 1500px; position: relative; transform-style: preserve-3d;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      [data-composition-id="s08-cascade"] .ppanel {
        position: absolute; width: 380px; height: 520px;
        background: #15132b; border: 2px solid rgba(179, 136, 250, 0.45); border-radius: 28px;
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5); padding: 30px 24px;
        display: flex; flex-direction: column; gap: 18px; backface-visibility: hidden;
        will-change: transform, opacity;
      }
      [data-composition-id="s08-cascade"] .p1 { background: #13112c; }
      [data-composition-id="s08-cascade"] .p2 { background: #171533; border-color: rgba(102, 170, 253, 0.45); }
      [data-composition-id="s08-cascade"] .p3 { background: #1a183a; border-color: rgba(251, 109, 142, 0.45); }

      [data-composition-id="s08-cascade"] .pp-head {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 24px; color: #b388fa;
      }
      [data-composition-id="s08-cascade"] .pp-greet {
        font-family: "Unbounded", sans-serif; font-weight: 600; font-size: 32px; color: #f2f0fa;
      }
      [data-composition-id="s08-cascade"] .pp-card {
        background: #1d1b38; border: 1.5px solid #28254c; border-radius: 20px;
        height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      }
      [data-composition-id="s08-cascade"] .pp-de {
        font-family: "Unbounded", sans-serif; font-weight: 700; font-size: 30px; color: #f2f0fa;
      }
      [data-composition-id="s08-cascade"] .pp-de.big { font-size: 36px; color: #66aafd; }
      [data-composition-id="s08-cascade"] .pp-mn { font-size: 22px; color: #a8a3c8; font-weight: 600; }
      [data-composition-id="s08-cascade"] .pp-row { display: flex; gap: 12px; }
      [data-composition-id="s08-cascade"] .pp-row span {
        flex: 1; text-align: center; background: #1d1b38; border: 1.5px solid #28254c;
        border-radius: 14px; padding: 12px 0; font-size: 22px; color: #a8a3c8; font-weight: 600;
      }
      [data-composition-id="s08-cascade"] .pp-flash {
        background: #201e40; border: 1.5px solid #2c2957; border-radius: 20px;
        height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      }
      [data-composition-id="s08-cascade"] .pp-ans { display: flex; flex-direction: column; gap: 10px; }
      [data-composition-id="s08-cascade"] .pp-ans span {
        text-align: center; border: 2px solid #28254c; background: #1d1b38;
        border-radius: 14px; padding: 14px 0; font-size: 22px; color: #a8a3c8; font-weight: 600;

      [data-composition-id="s08-cascade"] .pp-ans .ok { border-color: #66aafd; color: #66aafd; }
      [data-composition-id="s08-cascade"] .pp-srs { color: #b388fa; font-size: 22px; font-weight: 600; text-align: center; }
      [data-composition-id="s08-cascade"] .pp-q { font-size: 28px; color: #f2f0fa; font-weight: 600; text-align: center; }
      [data-composition-id="s08-cascade"] .pp-badge {
        align-self: center; font-family: "Unbounded", sans-serif; font-weight: 800; font-size: 42px; color: #060512;
        background: linear-gradient(135deg, #b388fa, #66aafd); border-radius: 18px; padding: 10px 40px; margin-top: auto;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const q = (s) => '[data-composition-id="s08-cascade"] ' + s;

        // Vertical 3D perspective stack.
        tl.set(q(".p1"), { rotationX: 12, rotationY: 8, z: -100, y: -260, x: -20 });
        tl.set(q(".p2"), { rotationX: 8, rotationY: 0, z: 0, y: 0, x: 0 });
        tl.set(q(".p3"), { rotationX: 4, rotationY: -8, z: -80, y: 260, x: 20 });

        tl.from(q(".p1"), { y: -600, x: -200, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.1);
        tl.from(q(".p2"), { y: 600, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.3);
        tl.from(q(".p3"), { y: 600, x: 200, opacity: 0, duration: 0.7, ease: "cubic-bezier(0.22,1,0.36,1)" }, 0.5);

        // Slow drift of the whole deck.
        tl.to(q(".deck"), { rotationY: 6, rotationX: 2, duration: 3, ease: "sine.inOut", transformOrigin: "50% 50%" }, 0.8);

        window.__timelines = window.__timelines || {};
        window.__timelines["s08-cascade"] = tl;
      })();
    </script>
  </div>
</template>
