<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1200" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Golos+Text:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #060512;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 72px 88px;
    overflow: hidden;
    font-family: "Golos Text", sans-serif;
  }

  /* Hero poster background */
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('../frontend/public/hero-poster.jpg');
    background-size: cover;
    background-position: center 38%;
    z-index: 0;
  }

  /* Legibility scrim — dark on left/bottom, fades right */
  .scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(90deg, rgba(6,5,18,0.92) 0%, rgba(6,5,18,0.78) 38%, rgba(6,5,18,0.32) 68%, rgba(6,5,18,0.10) 100%),
      linear-gradient(180deg, rgba(6,5,18,0.45) 0%, rgba(6,5,18,0.0) 35%, rgba(6,5,18,0.0) 55%, rgba(6,5,18,0.65) 100%);
    pointer-events: none;
  }

  /* Top border accent */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    z-index: 3;
    background: linear-gradient(90deg, #b388fa 0%, #66aafd 50%, #fb6d8e 100%);
  }

  .content {
    position: relative;
    z-index: 10;
    max-width: 820px;
  }

  /* Logo row */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .logo-svg {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .site-label {
    font-family: "Unbounded", sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(242, 240, 250, 0.70);
  }

  /* Brand name */
  .brand-name {
    font-family: "Unbounded", sans-serif;
    font-size: 76px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(105deg, #c9acff 0%, #a6c6ff 55%, #7fbcff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 22px;
    text-shadow: 0 4px 40px rgba(102,170,253,0.25);
  }

  /* Mongolian tagline */
  .tagline {
    font-family: "Golos Text", sans-serif;
    font-size: 23px;
    font-weight: 500;
    color: rgba(248, 247, 252, 0.92);
    line-height: 1.45;
    margin-bottom: 38px;
    letter-spacing: 0.01em;
    text-shadow: 0 2px 16px rgba(6,5,18,0.8);
  }

  /* Skill pills */
  .skills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .skill-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 17px;
    border-radius: 999px;
    background: rgba(179, 136, 250, 0.16);
    border: 1px solid rgba(179, 136, 250, 0.38);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    font-family: "Golos Text", sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #d7c4ff;
    letter-spacing: 0.02em;
  }

  .skill-pill.blue {
    background: rgba(102, 170, 253, 0.16);
    border-color: rgba(102, 170, 253, 0.38);
    color: #b3d4ff;
  }

  .skill-pill.rose {
    background: rgba(251, 109, 142, 0.16);
    border-color: rgba(251, 109, 142, 0.38);
    color: #ffb3c6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg"></div>
  <div class="scrim"></div>
  <div class="top-bar"></div>

  <!-- Main content -->
  <div class="content">
    <!-- Logo row -->
    <div class="logo-row">
      <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
        <defs>
          <linearGradient id="vl" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#b388fa"/>
            <stop offset="1" stop-color="#66aafd"/>
          </linearGradient>
        </defs>
        <circle cx="13" cy="19" r="9" fill="url(#vl)"/>
        <line x1="43" y1="16" x2="30" y2="48" stroke="url(#vl)" stroke-width="18" stroke-linecap="round"/>
      </svg>
      <span class="site-label">Vivid Lingua</span>
    </div>

    <!-- Brand name with gradient -->
    <div class="brand-name">Vivid Lingua</div>

    <!-- Mongolian taglines -->
    <div class="tagline">
      Герман ба англи хэлээ монголоороо ухаалгаар сур<br/>
      <span style="font-size:18px; opacity:0.78;">Монголчуудад зориулсан хэлний платформ</span>
    </div>

    <!-- Skill keywords -->
    <div class="skills">
      <span class="skill-pill">Герман</span>
      <span class="skill-pill blue">English</span>
      <span class="skill-pill">Унших</span>
      <span class="skill-pill blue">Сонсох</span>
      <span class="skill-pill">Ярих</span>
      <span class="skill-pill blue">Бичих</span>
      <span class="skill-pill rose">AI багш</span>
    </div>
  </div>
</div>
</body>
</html>
